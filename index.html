<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonte — Suivi de musculation</title>
<link rel="icon" type="image/png" sizes="192x192" href="icone-fonte-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icone-fonte-512.png">
<link rel="apple-touch-icon" href="icone-fonte-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15161a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fonte">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --bg:#15161a;
    --surface:#1e2027;
    --surface-2:#262933;
    --surface-3:#2f323d;
    --border:#383b46;
    --border-strong:#4a4e5c;
    --text:#edeef2;
    --text-dim:#9497a3;
    --text-faint:#6a6d78;
    --accent:#ff4d3d;
    --accent-dim:#5a2620;
    --steel:#5b9dff;
    --steel-dim:#1f3352;
    --ok:#4dd68a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:0;
  }
  .app{max-width:920px; margin:0 auto; padding:24px 16px 64px;}
  .header{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px;}
  .brand{font-family:'Oswald',sans-serif; font-weight:700; font-size:34px; letter-spacing:0.5px; text-transform:uppercase; color:var(--text);}
  .brand span{color:var(--accent);}
  .tagline{color:var(--text-faint); font-size:13px; letter-spacing:0.3px;}
  .profile-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .profile-bar select{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:7px 10px; border-radius:8px; font-size:13px;
  }
  .profile-bar button{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    padding:7px 10px; border-radius:8px; font-size:12px; cursor:pointer; white-space:nowrap;
  }
  .profile-bar button:hover{border-color:var(--steel); color:var(--steel);}
  .profile-divider{width:1px; height:20px; background:var(--border);}
  .grid{display:grid; grid-template-columns:1fr; gap:20px;}
  @media(min-width:760px){ .grid{grid-template-columns:340px 1fr;} }
  .card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px;}
  .card h2{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:16px;}
  label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; margin-top:14px; font-weight:500;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=date], select{
    width:100%; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px;
    font-family:'Inter',sans-serif;
  }
  input[type=text]:focus, input[type=date]:focus, select:focus, input[type=number]:focus{
    outline:none; border-color:var(--steel); box-shadow:0 0 0 3px var(--steel-dim);
  }
  .tab-switch{display:flex; gap:8px; margin-bottom:18px;}
  .tab-switch button{
    flex:1; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    padding:9px 6px; border-radius:8px; cursor:pointer; font-size:12.5px; font-family:'Oswald',sans-serif;
    text-transform:uppercase; letter-spacing:0.4px;
  }
  .tab-switch button.active{background:var(--steel-dim); border-color:var(--steel); color:#bcd6ff;}
  .autocomplete-wrap{position:relative;}
  .autocomplete-list{
    position:absolute; top:100%; left:0; right:0; background:var(--surface-2);
    border:1px solid var(--border); border-radius:8px; margin-top:4px; max-height:240px;
    overflow-y:auto; z-index:20; box-shadow:0 6px 18px rgba(0,0,0,0.35);
  }
  .ac-group-label{padding:8px 12px 3px; font-size:10px; text-transform:uppercase; color:var(--text-faint); letter-spacing:0.6px; font-weight:600;}
  .ac-item{padding:8px 12px; font-size:13.5px; cursor:pointer; color:var(--text);}
  .ac-item:hover, .ac-item.hl{background:var(--surface-3);}
  .new-ex-wrap{
    margin-top:12px; padding:12px; background:var(--surface-2); border:1px solid var(--border-strong);
    border-radius:8px;
  }
  .new-ex-wrap .hint{font-size:12px; color:var(--steel); margin-bottom:8px; display:flex; align-items:center; gap:6px;}
  .sets-row{display:grid; grid-template-columns:1fr 1fr auto; gap:8px; align-items:end; margin-top:10px;}
  .sets-row label{margin-top:0;}
  input[type=number]{
    width:100%; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px;
    font-family:'JetBrains Mono',monospace; font-weight:500;
  }
  .rm-set{
    background:transparent; border:1px solid var(--border); color:var(--text-faint);
    width:38px; height:38px; border-radius:8px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .rm-set:hover{border-color:var(--accent); color:var(--accent);}
  .quick-reps{display:flex; gap:6px; margin-top:10px;}
  .quick-reps button{
    flex:1; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    padding:8px 4px; border-radius:8px; font-size:12px; cursor:pointer; font-family:'JetBrains Mono',monospace;
  }
  .quick-reps button:hover{border-color:var(--steel); color:var(--steel);}
  .btn-add-set{
    width:100%; margin-top:12px; background:var(--surface-2); border:1px dashed var(--border-strong);
    color:var(--text-dim); padding:9px; border-radius:8px; cursor:pointer; font-size:13px;
  }
  .btn-add-set:hover{border-color:var(--steel); color:var(--steel);}
  .btn-save{
    width:100%; margin-top:18px; background:var(--accent); border:none;
    color:#2a0e09; font-weight:700; padding:12px; border-radius:8px; cursor:pointer;
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.6px; font-size:14px;
  }
  .btn-save:hover{background:#ff6353;}
  .btn-save:disabled{background:var(--surface-3); color:var(--text-faint); cursor:not-allowed;}
  .full-block{background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px;}
  .full-block-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .full-block-num{font-family:'Oswald',sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-faint);}
  .full-block-remove{background:none; border:none; color:var(--text-faint); font-size:16px; cursor:pointer; padding:2px 8px; border-radius:6px;}
  .full-block-remove:hover{color:var(--accent); background:var(--surface-3);}
  .btn-add-block{
    width:100%; background:var(--surface-2); border:1px dashed var(--border-strong);
    color:var(--text-dim); padding:10px; border-radius:8px; cursor:pointer; font-size:13px; margin-bottom:6px;
  }
  .btn-add-block:hover{border-color:var(--steel); color:var(--steel);}
  .btn-add-superset{
    width:100%; background:rgba(255,77,61,0.06); border:1px dashed var(--accent);
    color:#ff9587; padding:10px; border-radius:8px; cursor:pointer; font-size:13px; margin-bottom:14px;
  }
  .btn-add-superset:hover{background:rgba(255,77,61,0.12); color:var(--accent);}
  .full-superset{
    border:1px solid var(--accent); border-radius:10px; padding:14px; margin-bottom:14px;
    background:rgba(255,77,61,0.04);
  }
  .full-superset .full-block-num{color:var(--accent);}
  .superset-divider{
    text-align:center; font-size:11px; color:var(--accent); padding:8px 0;
    text-transform:uppercase; letter-spacing:0.4px; font-weight:600;
  }
  .superset-sub{padding:10px; background:var(--surface-3); border-radius:8px;}
  .workout-superset{border-left:3px solid var(--accent); padding-left:10px; margin-bottom:6px;}
  .workout-superset-label{
    font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.4px;
    margin-bottom:5px; font-weight:600;
  }
  .muscle-group{margin-bottom:14px;}
  .muscle-group:last-child{margin-bottom:18px;}
  .muscle-label{font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-faint); margin-bottom:7px; font-weight:600;}
  .exercise-list{display:flex; flex-direction:column;}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px;}
  .ex-chip{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    padding:7px 8px 7px 14px; border-radius:999px; font-size:13px; cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .ex-chip.active{background:var(--steel-dim); border-color:var(--steel); color:#bcd6ff;}
  .ex-chip .chip-x{
    color:var(--text-faint); font-size:14px; line-height:1; padding:2px 3px; border-radius:50%;
  }
  .ex-chip .chip-x:hover{color:var(--accent); background:rgba(255,77,61,0.12);}
  .hidden-toggle{
    background:none; border:none; color:var(--text-faint); font-size:12px; cursor:pointer;
    text-decoration:underline; padding:4px 0; margin-bottom:10px;
  }
  .hidden-toggle:hover{color:var(--steel);}
  .empty{color:var(--text-faint); font-size:14px; text-align:center; padding:40px 10px;}
  .pr-row{display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap;}
  .pr-tile{background:var(--surface-2); border-radius:10px; padding:12px 16px; flex:1; min-width:100px;}
  .pr-tile .lbl{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.5px;}
  .pr-tile .val{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:22px; color:var(--accent); margin-top:2px;}
  .pr-tile .val span{font-size:12px; color:var(--text-faint); font-weight:500;}
  .history{margin-top:20px;}
  .hist-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--border); gap:10px;
  }
  .hist-item:last-child{border-bottom:none;}
  .hist-date{font-size:12px; color:var(--text-faint); min-width:78px;}
  .hist-sets{display:flex; gap:6px; flex-wrap:wrap; flex:1;}
  .hist-set{
    background:var(--surface-2); border-radius:6px; padding:4px 9px; font-size:12px;
    font-family:'JetBrains Mono',monospace; color:var(--text-dim);
  }
  .hist-set b{color:var(--text);}
  .del-btn{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:15px; padding:4px;}
  .del-btn:hover{color:var(--accent);}
  .loading{text-align:center; color:var(--text-faint); padding:30px; font-size:13px;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--surface-3); border:1px solid var(--border-strong); color:var(--text);
    padding:11px 20px; border-radius:10px; font-size:13px; transition:transform 0.25s ease; z-index:50;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .workout-card{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:14px;}
  .workout-card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;}
  .workout-name{font-family:'Oswald',sans-serif; font-size:15px; text-transform:uppercase; letter-spacing:0.4px; color:var(--text);}
  .workout-date{font-size:12px; color:var(--text-faint); margin-top:2px;}
  .workout-exlist{display:flex; flex-direction:column; gap:8px; margin-bottom:12px;}
  .workout-exrow{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .workout-exname{font-size:13px; color:var(--text-dim); min-width:130px; font-weight:500;}
  .workout-actions{display:flex; gap:8px;}
  .btn-redo{
    flex:1; background:var(--steel-dim); border:1px solid var(--steel); color:#bcd6ff;
    padding:9px; border-radius:8px; cursor:pointer; font-size:12.5px; font-family:'Oswald',sans-serif;
    text-transform:uppercase; letter-spacing:0.4px;
  }
  .btn-redo:hover{background:#274070;}
  .btn-del-workout{
    background:none; border:1px solid var(--border); color:var(--text-faint);
    padding:9px 12px; border-radius:8px; cursor:pointer; font-size:13px;
  }
  .btn-del-workout:hover{border-color:var(--accent); color:var(--accent);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="brand">LA <span>FONTE</span></div>
      <div class="tagline">Ton historique de charges, séance après séance</div>
    </div>
    <div class="profile-bar">
      <select id="profile-select"></select>
      <button type="button" id="btn-new-profile">+ Nouveau profil</button>
      <div class="profile-divider"></div>
      <button type="button" id="btn-export">Exporter</button>
      <button type="button" id="btn-import">Importer</button>
      <input type="file" id="import-file" accept="application/json" style="display:none;">
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Nouvelle série</h2>
      <div class="tab-switch">
        <button type="button" class="tab-btn active" data-tab="single">Un exercice</button>
        <button type="button" class="tab-btn" data-tab="full">Séance complète</button>
      </div>

      <div id="tab-single">
        <label for="f-exercise">Exercice</label>
        <div class="autocomplete-wrap">
          <input type="text" id="f-exercise" placeholder="Développé couché" autocomplete="off">
          <div class="autocomplete-list" id="ac-list" style="display:none;"></div>
        </div>

        <div class="new-ex-wrap" id="new-ex-wrap" style="display:none;">
          <div class="hint">Nouvel exercice — choisis son groupe musculaire</div>
          <select id="new-group-select">
            <option value="">Sélectionner un groupe…</option>
          </select>
        </div>

        <label for="f-date">Date</label>
        <input type="date" id="f-date">

        <div id="sets-container"></div>

        <div class="quick-reps">
          <button type="button" data-reps="8">+ 8 reps</button>
          <button type="button" data-reps="10">+ 10 reps</button>
          <button type="button" data-reps="12">+ 12 reps</button>
        </div>
        <button type="button" class="btn-add-set" id="btn-add-custom">+ Ajouter une série (reps libres)</button>

        <button type="button" class="btn-save" id="btn-save">Enregistrer la séance</button>
      </div>

      <div id="tab-full" style="display:none;">
        <label for="full-session-name">Nom de la séance (optionnel)</label>
        <input type="text" id="full-session-name" placeholder="Ex: Jour push, Jambes...">

        <label for="full-date">Date de la séance</label>
        <input type="date" id="full-date">

        <div id="full-exercises-container" style="margin-top:14px;"></div>
        <button type="button" class="btn-add-block" id="btn-add-block">+ Ajouter un exercice</button>
        <button type="button" class="btn-add-superset" id="btn-add-superset">🔗 Ajouter un superset (2 exercices liés)</button>

        <button type="button" class="btn-save" id="btn-save-full">Enregistrer la séance complète</button>
      </div>
    </div>

    <div class="card">
      <h2>Historique</h2>
      <div class="tab-switch">
        <button type="button" class="hist-tab-btn active" data-histtab="exercise">Par exercice</button>
        <button type="button" class="hist-tab-btn" data-histtab="workout">Par séance</button>
      </div>

      <div id="view-by-exercise">
        <div id="exercise-list" class="exercise-list"></div>
        <div id="hidden-wrap"></div>
        <div id="pr-row" class="pr-row" style="display:none;"></div>
        <div style="position:relative; height:220px; display:none;" id="chart-wrap">
          <canvas id="progress-chart" role="img" aria-label="Évolution du poids par répétitions dans le temps"></canvas>
        </div>
        <div id="history-content">
          <div class="loading" id="loading-msg">Chargement de tes données…</div>
        </div>
      </div>

      <div id="view-by-workout" style="display:none;">
        <div id="workout-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let sessions = [];
let workouts = [];
let selectedExercise = null;
let chartInstance = null;
let setCounter = 0;
let blockCounter = 0;
let customGroups = {};
let hiddenExercises = [];
let showHidden = false;
let currentProfile = 'Moi';

const GROUP_ORDER = ["Pectoraux","Dos","Trapèzes","Épaules","Biceps","Triceps","Avant-bras","Abdominaux","Lombaires","Quadriceps","Ischio-jambiers","Fessiers","Mollets","Autre"];

const DEFAULT_EXERCISES = {
  "Développé couché":"Pectoraux",
  "Développé incliné":"Pectoraux",
  "Développé décliné":"Pectoraux",
  "Écarté couché":"Pectoraux",
  "Pec deck":"Pectoraux",
  "Pompes":"Pectoraux",
  "Dips":"Pectoraux",
  "Tractions":"Dos",
  "Rowing barre":"Dos",
  "Rowing haltère":"Dos",
  "Tirage vertical":"Dos",
  "Tirage horizontal":"Dos",
  "Soulevé de terre":"Dos",
  "Rowing T-bar":"Dos",
  "Shrugs":"Trapèzes",
  "Développé militaire":"Épaules",
  "Élévations latérales":"Épaules",
  "Élévations frontales":"Épaules",
  "Oiseau":"Épaules",
  "Arnold press":"Épaules",
  "Curl biceps":"Biceps",
  "Curl marteau":"Biceps",
  "Curl pupitre":"Biceps",
  "Curl incliné":"Biceps",
  "Extensions triceps":"Triceps",
  "Barre au front":"Triceps",
  "Poulie triceps":"Triceps",
  "Dips triceps":"Triceps",
  "Curl poignet":"Avant-bras",
  "Extensions poignet":"Avant-bras",
  "Crunch":"Abdominaux",
  "Gainage":"Abdominaux",
  "Relevé de jambes":"Abdominaux",
  "Crunch câble":"Abdominaux",
  "Hyperextensions":"Lombaires",
  "Good morning":"Lombaires",
  "Squat":"Quadriceps",
  "Presse à cuisses":"Quadriceps",
  "Fentes":"Quadriceps",
  "Leg extension":"Quadriceps",
  "Squat bulgare":"Quadriceps",
  "Leg curl":"Ischio-jambiers",
  "Soulevé de terre jambes tendues":"Ischio-jambiers",
  "Hip thrust":"Fessiers",
  "Extension de hanche":"Fessiers",
  "Mollets debout":"Mollets",
  "Mollets assis":"Mollets"
};

const REP_COLORS = { "8":"#ff4d3d", "10":"#5b9dff", "12":"#4dd68a", "other":"#c98cff" };

function colorForReps(reps){
  return REP_COLORS[String(reps)] || REP_COLORS.other;
}

function normKey(str){
  return str.trim().toLowerCase().replace(/\s+/g,' ');
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function storageKey(base){
  return 'fonte-' + base + '::' + currentProfile;
}

function safeGet(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}

function safeSet(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  }catch(e){
    showToast("Erreur d'enregistrement (stockage local indisponible).");
    return false;
  }
}

function genId(prefix){
  return prefix + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
}

function getCombinedLookup(){
  const lookup = {};
  Object.keys(DEFAULT_EXERCISES).forEach(name=>{
    lookup[normKey(name)] = { display: name, group: DEFAULT_EXERCISES[name] };
  });
  Object.keys(customGroups).forEach(key=>{
    lookup[key] = customGroups[key];
  });
  return lookup;
}

function getGroupForExercise(name){
  const lookup = getCombinedLookup();
  const entry = lookup[normKey(name)];
  return entry ? entry.group : "Autre";
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

function buildGroupOptionsHtml(){
  const groups = GROUP_ORDER.filter(g=> g !== "Autre");
  groups.push("Autre");
  return '<option value="">Sélectionner un groupe…</option>' + groups.map(g=> `<option value="${g}">${g}</option>`).join('');
}

function populateGroupSelect(){
  document.getElementById('new-group-select').innerHTML = buildGroupOptionsHtml();
}

/* ---------- tab switching (formulaire) ---------- */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=> b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-single').style.display = tab === 'single' ? 'block' : 'none';
    document.getElementById('tab-full').style.display = tab === 'full' ? 'block' : 'none';
    if(tab === 'full' && document.getElementById('full-exercises-container').children.length === 0){
      addExerciseBlock();
    }
  });
});

function activateFullTab(){
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.remove('active'));

/* ---------- generic autocomplete (used by both tabs) ---------- */
function renderAutocompleteInto(inputEl, listEl, query){
  const lookup = getCombinedLookup();
  const q = normKey(query);
  let entries = Object.values(lookup);
  if(q){ entries = entries.filter(e=> normKey(e.display).includes(q)); }
  if(entries.length === 0 || (!q && document.activeElement !== inputEl)){
    listEl.style.display = 'none';
    listEl.innerHTML = '';
    return;
  }
  const byGroup = {};
  entries.forEach(e=>{
    if(!byGroup[e.group]) byGroup[e.group] = [];
    byGroup[e.group].push(e.display);
  });
  const orderedGroups = GROUP_ORDER.filter(g=> byGroup[g]);
  let html = '';
  orderedGroups.forEach(g=>{
    html += `<div class="ac-group-label">${g}</div>`;
    byGroup[g].sort().forEach(name=>{
      html += `<div class="ac-item" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>`;
    });
  });
  listEl.innerHTML = html;
  listEl.style.display = html ? 'block' : 'none';
  listEl.querySelectorAll('.ac-item').forEach(item=>{
    item.addEventListener('mousedown', (ev)=>{
      ev.preventDefault();
      inputEl.value = item.dataset.name;
      listEl.style.display = 'none';
      inputEl.dispatchEvent(new Event('checkknown'));
    });
  });
}

function checkKnownInto(inputEl, wrapEl){
  const exercise = inputEl.value.trim();
  if(!exercise){ wrapEl.style.display = 'none'; return; }
  const lookup = getCombinedLookup();
  const known = lookup[normKey(exercise)];
  wrapEl.style.display = known ? 'none' : 'block';
}

function wireExerciseAutocomplete(inputEl, listEl, wrapEl){
  inputEl.addEventListener('input', ()=>{
    renderAutocompleteInto(inputEl, listEl, inputEl.value);
    checkKnownInto(inputEl, wrapEl);
  });
  inputEl.addEventListener('focus', ()=> renderAutocompleteInto(inputEl, listEl, inputEl.value));
  inputEl.addEventListener('blur', ()=>{
    setTimeout(()=>{ listEl.style.display = 'none'; }, 120);
  });
  inputEl.addEventListener('checkknown', ()=> checkKnownInto(inputEl, wrapEl));
}

function initExerciseInput(){
  wireExerciseAutocomplete(document.getElementById('f-exercise'), document.getElementById('ac-list'), document.getElementById('new-ex-wrap'));
}

/* ---------- generic set rows (used by both tabs) ---------- */
function addSetRowInto(container, reps, weight){
  setCounter++;
  const id = 'set-' + setCounter;
  const row = document.createElement('div');
  row.className = 'sets-row';
  row.id = id;
  row.innerHTML = `
    <div>
      <label>Répétitions</label>
      <input type="number" min="1" class="rep-input" value="${reps || ''}" placeholder="10">
    </div>
    <div>
      <label>Poids (kg)</label>
      <input type="number" min="0" step="0.5" class="weight-input" value="${(weight || weight===0) ? weight : ''}" placeholder="60">
    </div>
    <button type="button" class="rm-set" aria-label="Supprimer cette série" onclick="document.getElementById('${id}').remove()">×</button>
  `;
  container.appendChild(row);
  return row;
}

/* ---------- séance complète (multi-exercices + supersets) ---------- */
function renumberBlocks(){
  const blocks = document.querySelectorAll('#full-exercises-container .full-block');
  blocks.forEach((b, i)=>{ b.querySelector('.full-block-num').textContent = 'Exercice ' + (i+1); });
}

function createBlockCore(prefillExercise, prefillSets){
  const core = document.createElement('div');
  core.className = 'blk-core';
  core.innerHTML = `
    <label>Exercice</label>
    <div class="autocomplete-wrap">
      <input type="text" class="blk-ex-input" placeholder="Squat" autocomplete="off">
      <div class="autocomplete-list blk-ac-list" style="display:none;"></div>
    </div>
    <div class="new-ex-wrap blk-new-ex-wrap" style="display:none;">
      <div class="hint">Nouvel exercice — choisis son groupe musculaire</div>
      <select class="blk-new-group-select"></select>
    </div>
    <div class="blk-sets-container"></div>
    <div class="quick-reps">
      <button type="button" data-reps="8">+ 8 reps</button>
      <button type="button" data-reps="10">+ 10 reps</button>
      <button type="button" data-reps="12">+ 12 reps</button>
    </div>
    <button type="button" class="btn-add-set blk-add-set">+ Série libre</button>
  `;
  core.querySelector('.blk-new-group-select').innerHTML = buildGroupOptionsHtml();

  const input = core.querySelector('.blk-ex-input');
  const acList = core.querySelector('.blk-ac-list');
  const newExWrap = core.querySelector('.blk-new-ex-wrap');
  wireExerciseAutocomplete(input, acList, newExWrap);

  const setsContainer = core.querySelector('.blk-sets-container');
  core.querySelectorAll('.quick-reps button').forEach(btn=>{
    btn.addEventListener('click', ()=> addSetRowInto(setsContainer, btn.dataset.reps));
  });
  core.querySelector('.blk-add-set').addEventListener('click', ()=> addSetRowInto(setsContainer, ''));

  if(prefillExercise){
    input.value = prefillExercise;
    checkKnownInto(input, newExWrap);
  }
  if(prefillSets && prefillSets.length){
    prefillSets.forEach(s=> addSetRowInto(setsContainer, s.reps, s.weight));
  }else{
    addSetRowInto(setsContainer, 8);
    addSetRowInto(setsContainer, 10);
    addSetRowInto(setsContainer, 12);
  }
  return core;
}

function readBlockCore(core){
  const input = core.querySelector('.blk-ex-input');
  const raw = input.value.trim();
  const setRows = core.querySelectorAll('.blk-sets-container .sets-row');
  const sets = [];
  setRows.forEach(row=>{
    const reps = parseFloat(row.querySelector('.rep-input').value);
    const weight = parseFloat(row.querySelector('.weight-input').value);
    if(reps > 0 && weight >= 0){ sets.push({reps, weight}); }
  });
  const groupSelectVal = core.querySelector('.blk-new-group-select').value;
  return { input, raw, sets, groupSelectVal };
}

function resolveExercise(raw, chosenGroup, inputEl, newGroupEntries){
  const lookup = getCombinedLookup();
  const key = normKey(raw);
  const known = lookup[key];
  if(known) return known.display;
  if(!chosenGroup){
    showToast('Choisis un groupe musculaire pour « ' + raw + ' ».');
    inputEl.focus();
    return null;
  }
  newGroupEntries.push({ key, entry: { display: raw, group: chosenGroup } });
  return raw;
}

function addExerciseBlock(prefillExercise, prefillSets){
  blockCounter++;
  const container = document.getElementById('full-exercises-container');
  const div = document.createElement('div');
  div.className = 'full-block';
  div.innerHTML = `
    <div class="full-block-header">
      <span class="full-block-num">Exercice</span>
      <button type="button" class="full-block-remove" aria-label="Supprimer cet exercice">×</button>
    </div>
  `;
  const core = createBlockCore(prefillExercise, prefillSets);
  div.appendChild(core);
  container.appendChild(div);

  div.querySelector('.full-block-remove').addEventListener('click', ()=>{
    div.remove();
    renumberBlocks();
  });

  renumberBlocks();
  if(!prefillExercise) core.querySelector('.blk-ex-input').focus();
  return div;
}

function addSupersetPair(prefillA, setsA, prefillB, setsB){
  blockCounter++;
  const container = document.getElementById('full-exercises-container');
  const div = document.createElement('div');
  div.className = 'full-superset';
  div.innerHTML = `
    <div class="full-block-header">
      <span class="full-block-num">🔗 Superset</span>
      <button type="button" class="full-block-remove" aria-label="Supprimer ce superset">×</button>
    </div>
  `;
  const coreA = createBlockCore(prefillA, setsA);
  const coreB = createBlockCore(prefillB, setsB);
  const wrapA = document.createElement('div'); wrapA.className = 'superset-sub'; wrapA.appendChild(coreA);
  const divider = document.createElement('div'); divider.className = 'superset-divider'; divider.textContent = '↳ enchaîné sans repos avec';
  const wrapB = document.createElement('div'); wrapB.className = 'superset-sub'; wrapB.appendChild(coreB);
  div.appendChild(wrapA);
  div.appendChild(divider);
  div.appendChild(wrapB);
  container.appendChild(div);

  div.querySelector('.full-block-remove').addEventListener('click', ()=>{
    div.remove();
    renumberBlocks();
  });

  renumberBlocks();
  if(!prefillA) coreA.querySelector('.blk-ex-input').focus();
  return div;
}

document.getElementById('btn-add-block').addEventListener('click', ()=> addExerciseBlock());
document.getElementById('btn-add-superset').addEventListener('click', ()=> addSupersetPair());

document.getElementById('btn-save-full').addEventListener('click', ()=>{
  const date = document.getElementById('full-date').value;
  if(!date){ showToast('Indique une date pour la séance.'); return; }
  const sessionName = document.getElementById('full-session-name').value.trim();

  const topNodes = Array.from(document.getElementById('full-exercises-container').children);
  const staged = [];
  const newGroupEntries = [];

  for(const node of topNodes){
    if(node.classList.contains('full-block')){
      const core = node.querySelector('.blk-core');
      const {input, raw, sets} = readBlockCore(core);
      if(!raw) continue;
      const groupSelectVal = core.querySelector('.blk-new-group-select').value;
      const resolved = resolveExercise(raw, groupSelectVal, input, newGroupEntries);
      if(resolved === null) return;
      if(sets.length === 0){
        showToast('Ajoute au moins une série valide pour « ' + resolved + ' ».');
        input.focus();
        return;
      }
      staged.push({ exercise: resolved, sets });

    }else if(node.classList.contains('full-superset')){
      const cores = node.querySelectorAll('.blk-core');
      const dataA = readBlockCore(cores[0]);
      const dataB = readBlockCore(cores[1]);
      if(!dataA.raw && !dataB.raw) continue;
      if(!dataA.raw || !dataB.raw){
        showToast('Un superset doit contenir 2 exercices renseignés.');
        (dataA.raw ? dataB.input : dataA.input).focus();
        return;
      }
      const resolvedA = resolveExercise(dataA.raw, dataA.groupSelectVal, dataA.input, newGroupEntries);
      if(resolvedA === null) return;
      const resolvedB = resolveExercise(dataB.raw, dataB.groupSelectVal, dataB.input, newGroupEntries);
      if(resolvedB === null) return;
      if(dataA.sets.length === 0){
        showToast('Ajoute au moins une série valide pour « ' + resolvedA + ' ».');
        dataA.input.focus();
        return;
      }
      if(dataB.sets.length === 0){
        showToast('Ajoute au moins une série valide pour « ' + resolvedB + ' ».');
        dataB.input.focus();
        return;
      }
      const supersetId = genId('ss');
      staged.push({ exercise: resolvedA, sets: dataA.sets, supersetId });
      staged.push({ exercise: resolvedB, sets: dataB.sets, supersetId });
    }
  }

  if(staged.length === 0){ showToast('Ajoute au moins un exercice avec ses séries.'); return; }

  newGroupEntries.forEach(({key, entry})=>{ customGroups[key] = entry; });
  if(newGroupEntries.length > 0) saveCustomGroups();

  const workoutId = genId('wk');
  const workoutLabel = sessionName || ('Séance du ' + formatDateFr(date));
  workouts.push({ id: workoutId, name: workoutLabel, date, entries: staged.map(s=>({exercise:s.exercise, sets:s.sets, supersetId: s.supersetId || null})) });
  saveWorkouts();

  staged.forEach(item=>{
    sessions.push({ id: genId('sess'), exercise: item.exercise, date, sets: item.sets, workoutId, supersetId: item.supersetId || null });
    if(hiddenExercises.includes(item.exercise)){
      hiddenExercises = hiddenExercises.filter(e=> e !== item.exercise);
    }
  });
  saveSessions();
  saveHidden();

  showToast('Séance complète enregistrée (' + staged.length + ' exercice(s)).');

  document.getElementById('full-exercises-container').innerHTML = '';
  document.getElementById('full-session-name').value = '';
  addExerciseBlock();

  selectedExercise = staged[staged.length-1].exercise;
  renderExerciseList();
  renderHistory();
  renderWorkoutHistory();
});

function formatDateFr(dateStr){
  return new Date(dateStr).toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
}

}

  if(profiles.length === 0){ profiles = ['Moi']; safeSet('fonte-profiles', profiles); }

document.getElementById('btn-new-profile').addEventListener('click', ()=>{
  const name = prompt('Nom du nouveau profil :');
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  const profiles = getProfiles();
  if(!profiles.includes(trimmed)){
    profiles.push(trimmed);
    safeSet('fonte-profiles', profiles);
  }
  currentProfile = trimmed;
  safeSet('fonte-current-profile', currentProfile);
  renderProfileSelect();
  selectedExercise = null;
  showHidden = false;
  loadProfileData();
  showToast('Profil « ' + trimmed + ' » créé.');
});

/* ---------- export / import ---------- */
function exportData(){
  const data = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('fonte-')){ data[k] = localStorage.getItem(k); }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fonte-sauvegarde-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Sauvegarde téléchargée.');
}

function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    let data;
    try{
      data = JSON.parse(e.target.result);
    }catch(err){
      showToast('Fichier invalide, import annulé.');
      return;
    }
    const keys = Object.keys(data).filter(k=> k.startsWith('fonte-'));
    if(keys.length === 0){ showToast('Fichier vide ou invalide.'); return; }
    const ok = confirm('Importer ' + keys.length + ' entrée(s) ? Cela remplacera les données existantes portant les mêmes clés (profils, séances) dans ce navigateur.');
    if(!ok) return;
    keys.forEach(k=> localStorage.setItem(k, data[k]));
    showToast('Données importées. Rechargement…');
    setTimeout(()=> location.reload(), 900);
  };
  reader.readAsText(file);
}

document.getElementById('btn-export').addEventListener('click', exportData);
document.getElementById('btn-import').addEventListener('click', ()=> document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importDataFromFile(file);
  e.target.value = '';
});

/* ---------- enregistrement onglet "un exercice" ---------- */
document.getElementById('btn-save').addEventListener('click', ()=>{
  let exercise = document.getElementById('f-exercise').value.trim();
  const date = document.getElementById('f-date').value;
  if(!exercise){ showToast('Indique un exercice.'); return; }
  if(!date){ showToast('Indique une date.'); return; }

  const lookup = getCombinedLookup();
  const key = normKey(exercise);
  const known = lookup[key];

  if(!known){
    const chosenGroup = document.getElementById('new-group-select').value;
    if(!chosenGroup){
      showToast('Choisis un groupe musculaire pour ce nouvel exercice.');
      return;
    }
    customGroups[key] = { display: exercise, group: chosenGroup };
    saveCustomGroups();
  }else{
    exercise = known.display;
  }

  const setRows = document.querySelectorAll('#sets-container .sets-row');
  const sets = [];
  setRows.forEach(row=>{
    const reps = parseFloat(row.querySelector('.rep-input').value);
    const weight = parseFloat(row.querySelector('.weight-input').value);
    if(reps > 0 && weight >= 0){ sets.push({reps, weight}); }
  });
  if(sets.length === 0){ showToast('Ajoute au moins une série valide.'); return; }

  const workoutId = genId('wk');
  workouts.push({ id: workoutId, name: 'Séance du ' + formatDateFr(date), date, entries: [{exercise, sets}] });
  saveWorkouts();

  sessions.push({
    id: genId('sess'),
    exercise, date, sets, workoutId
  });
  saveSessions();

  if(hiddenExercises.includes(exercise)){
    hiddenExercises = hiddenExercises.filter(e=> e !== exercise);
    saveHidden();
  }

  showToast('Séance enregistrée.');

  document.getElementById('sets-container').innerHTML = '';
  document.getElementById('f-exercise').value = '';
  document.getElementById('new-ex-wrap').style.display = 'none';
  document.getElementById('new-group-select').value = '';

  selectedExercise = exercise;
  renderExerciseList();
  renderHistory();
  renderWorkoutHistory();
});

/* ---------- listes et historique par exercice ---------- */
function getAllExercises(){
  const set = new Set(sessions.map(s=>s.exercise));
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}

function renderExerciseList(){
  const wrap = document.getElementById('exercise-list');
  const hiddenWrap = document.getElementById('hidden-wrap');
  const all = getAllExercises();
  const visible = all.filter(ex=> !hiddenExercises.includes(ex));
  const hidden = all.filter(ex=> hiddenExercises.includes(ex));

  if(all.length === 0){ wrap.innerHTML = ''; hiddenWrap.innerHTML = ''; return; }
  if(!selectedExercise || !visible.includes(selectedExercise)){
    selectedExercise = visible[0] || null;
  }

  const byGroup = {};
  visible.forEach(ex=>{
    const g = getGroupForExercise(ex);
    if(!byGroup[g]) byGroup[g] = [];
    byGroup[g].push(ex);
  });
  const orderedGroups = GROUP_ORDER.filter(g=> byGroup[g]);
  wrap.innerHTML = orderedGroups.map(g=>{
    const chips = byGroup[g].sort((a,b)=>a.localeCompare(b)).map(ex=>
      `<span class="ex-chip ${ex===selectedExercise?'active':''}" data-ex="${escapeHtml(ex)}">
        <span class="chip-label">${escapeHtml(ex)}</span>
        <span class="chip-x" data-del="${escapeHtml(ex)}" title="Retirer de la liste" aria-label="Retirer ${escapeHtml(ex)} de la liste">×</span>
      </span>`
    ).join('');
    return `<div class="muscle-group"><div class="muscle-label">${g}</div><div class="chip-row">${chips}</div></div>`;
  }).join('');

  wrap.querySelectorAll('.chip-label').forEach(lbl=>{
    lbl.parentElement.addEventListener('click', (ev)=>{
      if(ev.target.classList.contains('chip-x')) return;
      selectedExercise = ev.currentTarget.dataset.ex;
      renderExerciseList();
      renderHistory();
    });
  });
  wrap.querySelectorAll('.chip-x').forEach(x=>{
    x.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      const ex = x.dataset.del;
      hiddenExercises.push(ex);
      saveHidden();
      showToast('« ' + ex + ' » retiré de la liste. Ses séances sont conservées.');
      renderExerciseList();
      renderHistory();
    });
  });

  if(hidden.length === 0){
    hiddenWrap.innerHTML = '';
  }else{
    if(!showHidden){
      hiddenWrap.innerHTML = `<button type="button" class="hidden-toggle" id="show-hidden-btn">${hidden.length} exercice(s) masqué(s) — afficher</button>`;
      document.getElementById('show-hidden-btn').addEventListener('click', ()=>{ showHidden = true; renderExerciseList(); renderHistory(); });
    }else{
      const chips = hidden.sort((a,b)=>a.localeCompare(b)).map(ex=>
        `<span class="ex-chip" data-ex="${escapeHtml(ex)}" style="opacity:0.6;">
          <span class="chip-label">${escapeHtml(ex)}</span>
          <span class="chip-x" data-restore="${escapeHtml(ex)}" title="Réafficher">↺</span>
        </span>`
      ).join('');
      hiddenWrap.innerHTML = `<button type="button" class="hidden-toggle" id="hide-hidden-btn">Masquer la liste</button><div class="chip-row" style="margin-bottom:14px;">${chips}</div>`;
      document.getElementById('hide-hidden-btn').addEventListener('click', ()=>{ showHidden = false; renderExerciseList(); renderHistory(); });
      hiddenWrap.querySelectorAll('.chip-x').forEach(x=>{
        x.addEventListener('click', ()=>{
          const ex = x.dataset.restore;
          hiddenExercises = hiddenExercises.filter(e=> e !== ex);
          saveHidden();
          showToast('« ' + ex + ' » réaffiché.');
          renderExerciseList();
          renderHistory();
        });
      });
    }
  }
}

function renderPRs(exSessions){
  const prRow = document.getElementById('pr-row');
  const byReps = {};
  exSessions.forEach(s=>{
    s.sets.forEach(set=>{
      const key = String(set.reps);
      if(!byReps[key] || set.weight > byReps[key]) byReps[key] = set.weight;
    });
  });
  const keys = Object.keys(byReps).sort((a,b)=>Number(a)-Number(b)).slice(0,4);
  if(keys.length === 0){ prRow.style.display = 'none'; return; }
  prRow.style.display = 'flex';
  prRow.innerHTML = keys.map(k=>
    `<div class="pr-tile"><div class="lbl">Max à ${k} reps</div><div class="val">${byReps[k]}<span> kg</span></div></div>`
  ).join('');
}

function renderChart(exSessions){
  const wrap = document.getElementById('chart-wrap');
  if(exSessions.length < 2){ wrap.style.display = 'none'; if(chartInstance){chartInstance.destroy(); chartInstance=null;} return; }
  wrap.style.display = 'block';

  const repsSet = new Set();
  exSessions.forEach(s=> s.sets.forEach(set=> repsSet.add(String(set.reps))));
  const repsList = Array.from(repsSet).sort((a,b)=>Number(a)-Number(b));

  const sorted = [...exSessions].sort((a,b)=> new Date(a.date) - new Date(b.date));
  const labels = sorted.map(s=> new Date(s.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}));

  const datasets = repsList.map(reps=>{
    const data = sorted.map(s=>{
      const matching = s.sets.filter(set=> String(set.reps) === reps);
      if(matching.length === 0) return null;
      return Math.max(...matching.map(m=>m.weight));
    });
    return {
      label: reps + ' reps',
      data,
      borderColor: colorForReps(reps),
      backgroundColor: colorForReps(reps),
      spanGaps: true,
      tension: 0.25,
      borderWidth: 2,
      pointRadius: 4,
      pointBackgroundColor: colorForReps(reps)
    };
  });

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('progress-chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { ticks: { color: '#9497a3', callback: v => v + ' kg' }, grid: { color: '#2c2f38' } },
        x: { ticks: { color: '#9497a3' }, grid: { display: false } }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });

  const legendHtml = repsList.map(r=>
    `<span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:${colorForReps(r)};display:inline-block;"></span>${r} reps</span>`
  ).join('');
  let legendEl = document.getElementById('chart-legend');
  if(!legendEl){
    legendEl = document.createElement('div');
    legendEl.id = 'chart-legend';
    legendEl.style.cssText = 'display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:var(--text-dim);';
    wrap.parentNode.insertBefore(legendEl, wrap);
  }
  legendEl.innerHTML = legendHtml;
}

function renderHistory(){
  const content = document.getElementById('history-content');
  if(!selectedExercise){
    document.getElementById('pr-row').style.display = 'none';
    document.getElementById('chart-wrap').style.display = 'none';
    const oldLegend = document.getElementById('chart-legend');
    if(oldLegend) oldLegend.remove();
    content.innerHTML = '<div class="empty">Ajoute ta première série pour démarrer ton suivi.</div>';
    return;
  }
  const exSessions = sessions.filter(s=> s.exercise === selectedExercise);
  renderPRs(exSessions);
  renderChart(exSessions);

  const sorted = [...exSessions].sort((a,b)=> new Date(b.date) - new Date(a.date));
  content.innerHTML = '<div class="history">' + sorted.map(s=>{
    const dateStr = formatDateFr(s.date);
    const setsHtml = s.sets.map(set=> `<span class="hist-set"><b>${set.weight}kg</b> × ${set.reps}</span>`).join('');
    return `<div class="hist-item">
      <span class="hist-date">${dateStr}</span>
      <span class="hist-sets">${setsHtml}</span>
      <button class="del-btn" aria-label="Supprimer cette séance" data-id="${s.id}">×</button>
    </div>`;
  }).join('') + '</div>';

  content.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      deleteSessionEntry(btn.dataset.id);
    });
  });
}

function deleteSessionEntry(id){
  const entry = sessions.find(s=> s.id === id);
  sessions = sessions.filter(s=> s.id !== id);
  saveSessions();
  if(entry && entry.workoutId){
    const w = workouts.find(w=> w.id === entry.workoutId);
    if(w){
      w.entries = w.entries.filter(e=> e.exercise !== entry.exercise);
      if(w.entries.length === 0){
        workouts = workouts.filter(x=> x.id !== w.id);
      }
      saveWorkouts();
    }
  }
  renderExerciseList();
  renderHistory();
  renderWorkoutHistory();
  showToast('Séance supprimée.');
}

/* ---------- historique par séance (workouts) ---------- */
function renderWorkoutHistory(){
  const listEl = document.getElementById('workout-list');
  if(!listEl) return;
  if(workouts.length === 0){
    listEl.innerHTML = '<div class="empty">Aucune séance enregistrée pour l’instant. Utilise l’onglet « Séance complète » pour en créer une.</div>';
    return;
  }
  const sorted = [...workouts].sort((a,b)=> new Date(b.date) - new Date(a.date));
  listEl.innerHTML = sorted.map(w=>{
    let exRows = '';
    let i = 0;
    while(i < w.entries.length){
      const e = w.entries[i];
      const next = w.entries[i+1];
      if(e.supersetId && next && next.supersetId === e.supersetId){
        const setsHtmlA = e.sets.map(s=> `<span class="hist-set"><b>${s.weight}kg</b> × ${s.reps}</span>`).join('');
        const setsHtmlB = next.sets.map(s=> `<span class="hist-set"><b>${s.weight}kg</b> × ${s.reps}</span>`).join('');
        exRows += `<div class="workout-superset">
          <div class="workout-superset-label">🔗 Superset</div>
          <div class="workout-exrow"><span class="workout-exname">${escapeHtml(e.exercise)}</span><span class="hist-sets">${setsHtmlA}</span></div>
          <div class="workout-exrow"><span class="workout-exname">${escapeHtml(next.exercise)}</span><span class="hist-sets">${setsHtmlB}</span></div>
        </div>`;
        i += 2;
      }else{
        const setsHtml = e.sets.map(s=> `<span class="hist-set"><b>${s.weight}kg</b> × ${s.reps}</span>`).join('');
        exRows += `<div class="workout-exrow"><span class="workout-exname">${escapeHtml(e.exercise)}</span><span class="hist-sets">${setsHtml}</span></div>`;
        i += 1;
      }
    }
    return `<div class="workout-card">
      <div class="workout-card-top">
        <div>
          <div class="workout-name">${escapeHtml(w.name)}</div>
          <div class="workout-date">${formatDateFr(w.date)} · ${w.entries.length} exercice(s)</div>
        </div>
        <button type="button" class="btn-del-workout" data-wid="${w.id}" aria-label="Supprimer cette séance">×</button>
      </div>
      <div class="workout-exlist">${exRows}</div>
      <div class="workout-actions">
        <button type="button" class="btn-redo" data-redo="${w.id}">↺ Refaire cette séance</button>
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.btn-redo').forEach(btn=>{
    btn.addEventListener('click', ()=> redoWorkout(btn.dataset.redo));
  });
  listEl.querySelectorAll('.btn-del-workout').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ok = confirm('Supprimer cette séance et toutes ses séries associées ?');
      if(!ok) return;
      deleteWorkout(btn.dataset.wid);
    });
  });
}

function deleteWorkout(workoutId){
  workouts = workouts.filter(w=> w.id !== workoutId);
  sessions = sessions.filter(s=> s.workoutId !== workoutId);
  saveWorkouts();
  saveSessions();
  renderExerciseList();
  renderHistory();
  renderWorkoutHistory();
  showToast('Séance supprimée.');
}

function redoWorkout(workoutId){
  const w = workouts.find(w=> w.id === workoutId);
  if(!w) return;

  activateFullTab();
  document.getElementById('full-exercises-container').innerHTML = '';
  document.getElementById('full-date').valueAsDate = new Date();
  document.getElementById('full-session-name').value = w.name || '';

  let i = 0;
  while(i < w.entries.length){
    const e = w.entries[i];
    const next = w.entries[i+1];
    if(e.supersetId && next && next.supersetId === e.supersetId){
      addSupersetPair(e.exercise, e.sets, next.exercise, next.sets);
      i += 2;
    }else{
      addExerciseBlock(e.exercise, e.sets);
      i += 1;
    }
  }

  showToast('Séance pré-remplie avec les poids précédents — ajuste puis enregistre.');
  window.scrollTo({top:0, behavior:'smooth'});
}

function init(){
  populateGroupSelect();
  initExerciseInput();
  document.getElementById('f-date').valueAsDate = new Date();
  document.getElementById('full-date').valueAsDate = new Date();
  addSetRow(8);
  addSetRow(10);
  addSetRow(12);
  initProfiles();
  loadProfileData();
}

init();
</script>
</body>
</html>
